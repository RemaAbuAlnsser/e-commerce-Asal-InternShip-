<div class="admin-layout" [class.sidebar-open]="isSidebarOpen" [class.mobile]="isMobile">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 7V17C3 18.1 3.9 19 5 19H19C20.1 19 21 18.1 21 17V7C21 5.9 20.1 5 19 5H5C3.9 5 3 5.9 3 7Z" stroke="currentColor" stroke-width="2"/>
          <path d="M8 5V3C8 2.4 8.4 2 9 2H15C15.6 2 16 2.4 16 3V5" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
        </svg>
        <span class="logo-text">E-Commerce Admin</span>
      </div>
      <button class="close-btn" (click)="toggleSidebar()" *ngIf="isMobile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li class="nav-item" *ngFor="let item of menuItems">
          <a 
            class="nav-link" 
            [class.active]="item.active"
            (click)="navigateTo(item.route)"
          >
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Dashboard Icon -->
                <g *ngIf="item.icon === 'dashboard'">
                  <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                  <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                  <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                  <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Category Icon -->
                <g *ngIf="item.icon === 'category'">
                  <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2"/>
                  <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2"/>
                  <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Brand Icon -->
                <g *ngIf="item.icon === 'brand'">
                  <path d="M20.24 12.24A6 6 0 0 0 21 10C21 5.58 17.42 2 13 2H11L4 9L11 16H13A6 6 0 0 0 10.24 20.24" stroke="currentColor" stroke-width="2"/>
                  <circle cx="16" cy="8" r="2" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Inventory Icon -->
                <g *ngIf="item.icon === 'inventory'">
                  <path d="M21 16V8A2 2 0 0 0 19 6H5A2 2 0 0 0 3 8V16A2 2 0 0 0 5 18H19A2 2 0 0 0 21 16Z" stroke="currentColor" stroke-width="2"/>
                  <polyline points="7,6 7,4 17,4 17,6" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Shopping Cart Icon -->
                <g *ngIf="item.icon === 'shopping_cart'">
                  <circle cx="8" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                  <circle cx="19" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                  <path d="M2.05 2.05H4L6.2 12.05A2 2 0 0 0 8.17 14H19.05A2 2 0 0 0 21 12.05L22.05 5.05H5.12" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Shipping Icon -->
                <g *ngIf="item.icon === 'local_shipping'">
                  <path d="M1 3H15V13H1V3Z" stroke="currentColor" stroke-width="2"/>
                  <path d="M16 8H20L23 11V16H16V8Z" stroke="currentColor" stroke-width="2"/>
                  <circle cx="5.5" cy="18.5" r="2.5" stroke="currentColor" stroke-width="2"/>
                  <circle cx="18.5" cy="18.5" r="2.5" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- People Icon -->
                <g *ngIf="item.icon === 'people'">
                  <path d="M17 21V19A4 4 0 0 0 13 15H5A4 4 0 0 0 1 19V21" stroke="currentColor" stroke-width="2"/>
                  <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                  <path d="M23 21V19A4 4 0 0 0 19 15.3" stroke="currentColor" stroke-width="2"/>
                  <path d="M16 3.13A4 4 0 0 1 16 11.87" stroke="currentColor" stroke-width="2"/>
                </g>
              </svg>
            </span>
            <span class="nav-text">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 21V19A4 4 0 0 0 16 15H8A4 4 0 0 0 4 19V21" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <div class="admin-details">
          <div class="admin-name">{{ getAdminName() }}</div>
          <div class="admin-email">{{ getAdminEmail() }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H9" stroke="currentColor" stroke-width="2"/>
          <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-content">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" (click)="toggleSidebar()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/>
            <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2"/>
            <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-item">Admin</span>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-item current">{{ getCurrentPageName() }}</span>
        </div>
      </div>
      
      <div class="topbar-right">
        <div class="topbar-actions">
          <button class="action-btn" title="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="2"/>
              <path d="M13.73 21A2 2 0 0 1 10.27 21" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span class="notification-badge">3</span>
          </button>
          
          <button class="action-btn" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              <path d="M19.4 15A1.65 1.65 0 0 0 19 14.3L20.25 12.82A1.65 1.65 0 0 0 20.25 11.18L19 9.7A1.65 1.65 0 0 0 19.4 9A1.65 1.65 0 0 0 18.7 8.6L17.22 7.35A1.65 1.65 0 0 0 15.58 7.35L14.1 8.6A1.65 1.65 0 0 0 13.4 9A1.65 1.65 0 0 0 13 9.7L11.75 11.18A1.65 1.65 0 0 0 11.75 12.82L13 14.3A1.65 1.65 0 0 0 13.4 15A1.65 1.65 0 0 0 14.1 15.4L15.58 16.65A1.65 1.65 0 0 0 17.22 16.65L18.7 15.4A1.65 1.65 0 0 0 19.4 15Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Overlay -->
  <div 
    class="mobile-overlay" 
    [class.active]="isSidebarOpen && isMobile"
    (click)="toggleSidebar()"
  ></div>
</div>
