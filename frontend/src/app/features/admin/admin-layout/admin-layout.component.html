<div class="admin-layout" [class.sidebar-open]="isSidebarOpen" [class.mobile]="isMobile">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 7V17C3 18.1 3.9 19 5 19H19C20.1 19 21 18.1 21 17V7C21 5.9 20.1 5 19 5H5C3.9 5 3 5.9 3 7Z" stroke="currentColor" stroke-width="2"/>
          <path d="M8 5V3C8 2.4 8.4 2 9 2H15C15.6 2 16 2.4 16 3V5" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
        </svg>
        <span class="logo-text">E-Commerce Admin</span>
      </div>
      <button class="close-btn" (click)="toggleSidebar()" *ngIf="isMobile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li class="nav-item" *ngFor="let item of menuItems">
          <a
            class="nav-link"
            [class.active]="item.active"
            (click)="navigateTo(item.route)"
          >
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Dashboard Icon -->
                <g *ngIf="item.icon === 'dashboard'">
                  <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                  <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                  <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                  <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Category Icon -->
                <g *ngIf="item.icon === 'category'">
                  <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2"/>
                  <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2"/>
                  <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Brand Icon -->
                <g *ngIf="item.icon === 'brand'">
                  <path d="M20.24 12.24A6 6 0 0 0 21 10C21 5.58 17.42 2 13 2H11L4 9L11 16H13A6 6 0 0 0 10.24 20.24" stroke="currentColor" stroke-width="2"/>
                  <circle cx="16" cy="8" r="2" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Inventory Icon -->
                <g *ngIf="item.icon === 'inventory'">
                  <path d="M21 16V8A2 2 0 0 0 19 6H5A2 2 0 0 0 3 8V16A2 2 0 0 0 5 18H19A2 2 0 0 0 21 16Z" stroke="currentColor" stroke-width="2"/>
                  <polyline points="7,6 7,4 17,4 17,6" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Shopping Cart Icon -->
                <g *ngIf="item.icon === 'shopping_cart'">
                  <circle cx="8" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                  <circle cx="19" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                  <path d="M2.05 2.05H4L6.2 12.05A2 2 0 0 0 8.17 14H19.05A2 2 0 0 0 21 12.05L22.05 5.05H5.12" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Shipping Icon -->
                <g *ngIf="item.icon === 'local_shipping'">
                  <path d="M1 3H15V13H1V3Z" stroke="currentColor" stroke-width="2"/>
                  <path d="M16 8H20L23 11V16H16V8Z" stroke="currentColor" stroke-width="2"/>
                  <circle cx="5.5" cy="18.5" r="2.5" stroke="currentColor" stroke-width="2"/>
                  <circle cx="18.5" cy="18.5" r="2.5" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- People Icon -->
                <g *ngIf="item.icon === 'people'">
                  <path d="M17 21V19A4 4 0 0 0 13 15H5A4 4 0 0 0 1 19V21" stroke="currentColor" stroke-width="2"/>
                  <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                  <path d="M23 21V19A4 4 0 0 0 19 15.3" stroke="currentColor" stroke-width="2"/>
                  <path d="M16 3.13A4 4 0 0 1 16 11.87" stroke="currentColor" stroke-width="2"/>
                </g>
                <!-- Settings Icon -->
                <g *ngIf="item.icon === 'settings'">
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2"/>
                </g>
              </svg>
            </span>
            <span class="nav-text">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 21V19A4 4 0 0 0 16 15H8A4 4 0 0 0 4 19V21" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <div class="admin-details">
          <div class="admin-name">{{ getAdminName() }}</div>
          <div class="admin-email">{{ getAdminEmail() }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H9" stroke="currentColor" stroke-width="2"/>
          <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-content">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" (click)="toggleSidebar()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/>
            <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2"/>
            <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-item">Admin</span>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-item current">{{ getCurrentPageName() }}</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="topbar-actions">

          <!-- Notification Bell -->
          <div class="notif-wrapper">
            <button class="action-btn notification-btn" title="Notifications" (click)="toggleNotifDropdown($event)">
              <svg class="bell-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9Z"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M10 21a2 2 0 0 0 4 0"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span class="notif-dot" *ngIf="unreadCount > 0"></span>
            </button>

            <!-- Dropdown -->
            <div class="notif-dropdown" [class.open]="isNotifOpen" (click)="$event.stopPropagation()">
              <div class="notif-header">
                <span class="notif-title">Notifications</span>
                <span class="notif-count" *ngIf="unreadCount > 0">{{ unreadCount }} new</span>
              </div>

              <div class="notif-list" *ngIf="notifications.length > 0; else emptyNotif">
                <div
                  class="notif-item"
                  *ngFor="let n of notifications"
                  [class.unread]="!n.isRead"
                  (click)="onNotifClick(n)"
                >
                  <div class="notif-icon-wrap" [ngClass]="notifIconClass(n.type)">
                    <!-- NEW_ORDER -->
                    <svg *ngIf="n.type === 'NEW_ORDER'" width="14" height="14" viewBox="0 0 24 24" fill="none">
                      <circle cx="8" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                      <circle cx="19" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                      <path d="M2.05 2.05H4L6.2 12.05A2 2 0 0 0 8.17 14H19.05A2 2 0 0 0 21 12.05L22.05 5.05H5.12" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <!-- LOW_STOCK -->
                    <svg *ngIf="n.type === 'LOW_STOCK'" width="14" height="14" viewBox="0 0 24 24" fill="none">
                      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="currentColor" stroke-width="2"/>
                      <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2"/>
                      <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <!-- OUT_OF_STOCK -->
                    <svg *ngIf="n.type === 'OUT_OF_STOCK'" width="14" height="14" viewBox="0 0 24 24" fill="none">
                      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                      <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2"/>
                      <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2"/>
                    </svg>
                  </div>
                  <div class="notif-body">
                    <div class="notif-item-title">{{ n.title }}</div>
                    <div class="notif-item-msg">{{ n.message }}</div>
                    <div class="notif-item-time">{{ notifService.formatTime(n.createdAt) }}</div>
                  </div>
                  <span class="unread-dot" *ngIf="!n.isRead"></span>
                </div>
              </div>

              <ng-template #emptyNotif>
                <div class="notif-empty">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                    <path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9Z" stroke="#cbd5e1" stroke-width="2"/>
                    <path d="M10 21a2 2 0 0 0 4 0" stroke="#cbd5e1" stroke-width="2"/>
                  </svg>
                  <p>No notifications</p>
                </div>
              </ng-template>

              <div class="notif-footer">
                <button class="view-all-btn" (click)="router.navigate(['/admin/dashboard'], { fragment: 'notifications' }); isNotifOpen = false">
                  View All
                </button>
              </div>
            </div>
          </div>

          <a class="action-btn" title="Settings" [routerLink]="['/admin/settings']">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M12 8.5a3.5 3.5 0 1 0 0 7a3.5 3.5 0 0 0 0-7Z" stroke="currentColor" stroke-width="2"/>
              <path d="M19.4 12a7.4 7.4 0 0 0 .05-.88a7.4 7.4 0 0 0-.05-.88l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.28 7.28 0 0 0-1.52-.88l-.38-2.65a.5.5 0 0 0-.5-.42h-4a.5.5 0 0 0-.5.42l-.38 2.65c-.54.22-1.05.52-1.52.88l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64L4.6 10.24c-.03.29-.05.58-.05.88s.02.59.05.88l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .6.22l2.49-1c.47.36.98.66 1.52.88l.38 2.65a.5.5 0 0 0 .5.42h4a.5.5 0 0 0 .5-.42l.38-2.65c.54-.22 1.05-.52 1.52-.88l2.49 1a.5.5 0 0 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64L19.4 12Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </a>

        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Overlay -->
  <div
    class="mobile-overlay"
    [class.active]="isSidebarOpen && isMobile"
    (click)="toggleSidebar()"
  ></div>
</div>
