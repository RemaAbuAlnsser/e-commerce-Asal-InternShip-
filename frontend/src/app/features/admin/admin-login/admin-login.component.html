<div class="login-container">
  <div class="login-card">
    
    <!-- Header -->
    <div class="login-header">
      <div class="admin-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2Z" fill="currentColor"/>
        </svg>
      </div>
      <h2>Admin Portal</h2>
      <p class="subtitle">Welcome back! Please sign in to continue</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-container">

          <!-- ICON -->
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="currentColor" stroke-width="2"/>
            <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2"/>
          </svg>

          <input 
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            class="form-control"
            placeholder="Enter your email"
            #emailInput
            #emailField="ngModel"
          >
        </div>

        <div class="field-error" *ngIf="emailField.invalid && (emailField.touched || submitted)">
          <span>Email is required</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-container">

          <!-- ICON -->
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2"/>
          </svg>

          <input 
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            class="form-control"
            placeholder="Enter your password"
            #passwordField="ngModel"
          >
        </div>

        <div class="field-error" *ngIf="passwordField.invalid && (passwordField.touched || submitted)">
          <span>Password is required</span>
        </div>
      </div>

      <!-- Error -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="login-btn"
        [disabled]="isLoading"
        [class.loading]="isLoading"
      >
        <span *ngIf="isLoading">Signing in...</span>
        <span *ngIf="!isLoading">Sign In</span>
      </button>

    </form>

  </div>
</div>
